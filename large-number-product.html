<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Convolution</title>
  <style>
    body {
      background-color: #050606ea;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      line-height: 1.6;
    }

    .container {
      margin: 40px auto;
      max-width: 900px;
      padding: 32px;
      background: #181a1b;
      border-radius: 12px;
      box-shadow: 0 4px 20px #000a;
    }

    /* Barre d'action */
    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      margin: 14px 0 18px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      color: #fff;
      background: #0f1112;
      border: 1px solid #2a2d2f;
      box-shadow: 0 2px 10px #0007;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      user-select: none;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: #121516;
      border-color: #3a3f42;
    }

    .hint {
      opacity: .75;
      font-size: 0.95rem;
    }

    /* Viewer PDF responsive */
    iframe.pdf-viewer {
      width: 100%;
      height: 80vh;           /* beaucoup mieux sur mobile que 800px */
      border: none;
      border-radius: 8px;
      background: #0b0c0d;
    }

    /* Ajustements mobile */
    @media (max-width: 600px) {
      .container {
        margin: 18px 12px;
        padding: 18px;
      }
      iframe.pdf-viewer {
        height: 72vh;
      }
      h1 {
        font-size: 1.6rem;
        margin: 0 0 6px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Convolution</h1>

    <div class="actions">
      <a class="btn" href="Convolution.pdf" target="_blank" rel="noopener">
        📄 Open PDF
      </a>
      <span class="hint">If the built-in viewer freezes on mobile, use the button.</span>
    </div>

    <iframe
      class="pdf-viewer"
      src="Convolution.pdf"
      title="Convolution PDF"
      loading="lazy">
    </iframe>
  </div>
</body>
</html>
